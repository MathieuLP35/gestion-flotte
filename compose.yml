services:
  # L'application PHP-FPM
  app:
    build: .
    container_name: laravel-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
      - bootstrap_cache:/var/www/bootstrap/cache
    env_file: .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
    networks:
      - app-network

  # Serveur Web Nginx
  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # Base de données PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: laravel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sail} -d ${DB_DATABASE:-laravel}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Serveur Redis (pour Reverb et les Queues)
  redis:
    image: redis:alpine
    container_name: laravel-redis
    networks:
      - app-network

  # Serveur Reverb (WebSockets)
  reverb:
    build: .
    container_name: laravel-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
      - bootstrap_cache:/var/www/bootstrap/cache
    env_file: .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
    depends_on:
      - app
      - redis
    networks:
      - app-network

  # Worker pour les files d'attente (Queues)
  worker:
    build: .
    container_name: laravel-worker
    env_file: .env
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
      - bootstrap_cache:/var/www/bootstrap/cache
    environment:
      - APP_ENV=production
      - DB_HOST=db
    depends_on:
      - app
      - redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  storage_data:
  bootstrap_cache:
# SonarCloud — utilisé si Sonar est lancé en local ou pour documenter la config.
# En CI, l’action surcharge avec -Dsonar.organization et -Dsonar.projectKey.
#
# À créer sur https://sonarcloud.io : projet + SONAR_TOKEN.
# Secret GitHub : SONAR_TOKEN (Settings → Secrets and variables → Actions → Secrets)

sonar.sources=app,config,database,routes,resources
sonar.exclusions=**/node_modules/**,**/vendor/**,**/storage/**,**/public/build/**,**/coverage/**
sonar.organization=sparkotto-v2
sonar.projectKey=MathieuLP35_gestion-flotte
# SonarCloud — utilisé si Sonar est lancé en local ou pour documenter la config.
# En CI, l’action surcharge avec -Dsonar.organization et -Dsonar.projectKey.
#
# À créer sur https://sonarcloud.io : projet + SONAR_TOKEN.
# Secret GitHub : SONAR_TOKEN (Settings → Secrets and variables → Actions → Secrets)

sonar.sources=app,config,database,routes,resources
sonar.tests=tests,resources/js
sonar.test.inclusions=**/*.spec.js,**/*.test.js
sonar.exclusions=**/node_modules/**,**/vendor/**,**/storage/**,**/public/build/**,**/coverage/**,**/*.spec.js,**/*.test.js
sonar.coverage.exclusions=database/migrations/**,database/seeders/**,routes/**,config/**,resources/**/*.js,resources/**/*.vue,**/*.spec.js
sonar.organization=sparkotto-v2
sonar.projectKey=MathieuLP35_gestion-flotte

# Couverture PHP (Clover généré par PHPUnit/PEST avec --coverage)
sonar.php.coverage.reportPaths=coverage/clover.xml
# Couverture JavaScript/Vue (LCOV généré par Vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/vue/lcov.info
# Docker Compose - Gestion Flotte
# Build local sur le VPS (pas de registry). Compatible Dockge.
# Usage: docker compose --env-file .env build && docker compose --env-file .env up -d
# Build args (Vite) : VITE_APP_NAME, REVERB_APP_KEY, REVERB_HOST, REVERB_PORT, REVERB_SCHEME dans .env

services:
  app:
    image: gestion-flotte-app:latest
    pull_policy: never  # image buildée sur le VPS, jamais depuis un registry
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Laravel}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-}
        VITE_REVERB_HOST: ${REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${REVERB_PORT:-8080}
        VITE_REVERB_SCHEME: ${REVERB_SCHEME:-https}
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app
    restart: unless-stopped

  reverb:
    image: gestion-flotte-app:latest
    pull_policy: never  # même image que app, buildée sur le VPS
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REVERB_SERVER_HOST: "0.0.0.0"
    command: ["php", "artisan", "reverb:start"]
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  queue:
    image: gestion-flotte-app:latest
    pull_policy: never  # même image que app, buildée sur le VPS
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-laravel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U \"$$POSTGRES_USER\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  storage_data:
  bootstrap_cache:
  postgres_data:
